<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="LogRegStyle.css">
</head>
<body>

<div class="container">
    <div class="left" style="background: url('LogRegImg.svg') center/cover no-repeat;">
        <div class="overlay">
            <div class="left-text">
                <h2>Unlock the Power of Perfect Harmony.</h2>
                <p>Save your favorite harmonies, manage your collections, and discover the shades that define your next project.</p>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="form-box">
            <h1>Start your Creativity!</h1>
            <p class="subtitle">Register your account</p>
            <form>
                <label>Username</label>
                <input type="text" placeholder="Username">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" placeholder="Password">
                    <span class="eye">👁</span>
                </div>
                <label>Confirm your password</label>
                <div class="input-group">
                    <input type="password" placeholder="Password">
                    <span class="eye">👁</span>
                </div>
                <button type="submit">Register</button>
            </form>
            <p class="bottom">Already have an account? <a href="#">Login</a></p>
        </div>
    </div>
</div>

<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        e.preventDefault(); 

        const inputs = form.querySelectorAll('input');
        const password = inputs[1].value;
        const confirmPassword = inputs[2].value;
        
        let allFilled = true;
        let data = "";

        // 1. Cek apakah ada kolom yang kosong
        inputs.forEach(input => {
            if (input.value.trim() === "") {
                allFilled = false;
            }
        });

        if (!allFilled) {
            window.alert("Peringatan: Semua kolom harus diisi!");
        } 
        // 2. Cek apakah password dan konfirmasi cocok
        else if (password !== confirmPassword) {
            window.alert("Peringatan: Password dan Konfirmasi Password tidak sama!");
        } 
        // 3. Jika semua valid
        else {
            inputs.forEach(input => {
                const label = input.parentElement.previousElementSibling?.innerText || "Field";
                data += `${label}: ${input.value}\n`;
            });
            window.alert("Registrasi Berhasil!\n\nData Akun Anda:\n" + data);
        }
    });
</script>

</body>
</html>
