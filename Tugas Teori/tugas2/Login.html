<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="LogRegStyle.css">
</head>
<body>

<div class="container">
    <div class="left" style="background: url('LogRegImg.svg') center/cover no-repeat;">
        <div class="overlay">
            <div class="left-text">
                <h2>Unlock the Power of Perfect Harmony.</h2>
                <p>Save your favorite harmonies, manage your collections, and discover the shades that define your next project.</p>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="form-box">
            <h1>Welcome back, Buddy</h1>
            <p class="subtitle">Sign in your account</p>
            <form>
                <label>Username</label>
                <input type="text" placeholder="Username">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" placeholder="Password">
                    <span class="eye">👁</span>
                </div>
                <button type="submit">Login</button>
            </form>
            <p class="bottom">Dont have any account? <a href="#">Register</a></p>
        </div>
    </div>
</div>

<script>
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const username = form.querySelectorAll('input')[0].value;
        const password = form.querySelectorAll('input')[1].value;

        if (username.trim() === "" || password.trim() === "") {
            window.alert("Peringatan: Username dan Password tidak boleh kosong!");
        } else {
            window.alert("Login Berhasil!\n\nSelamat Datang, " + username);
        }
    });
</script>

</body>
</html>
