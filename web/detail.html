<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra - Detail Page Review</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

    <div class="detail-main-wrapper">
        <aside class="sidebar-tags">
            <h3>Popular Tags</h3>
            <ul class="tag-list">
                <li class="tag-item">Dark</li>
                <li class="tag-item">Light</li>
                <li class="tag-item">Warm</li>
                <li class="tag-item">Cold</li>
                <li class="tag-item">Summer</li>
                <li class="tag-item">Nature</li>
            </ul>
        </aside>

        <main class="content-detail-container">
            <div class="palette-hero">
                <div class="main-preview-box">
                    <div class="palette-column" style="background-color: #730808;"></div>
                    <div class="palette-column" style="background-color: #DF3B3B;"></div>
                    <div class="palette-column" style="background-color: #EF4444;"></div>
                    <div class="palette-column" style="background-color: #F26868;"></div>
                    <div class="palette-column" style="background-color: #FB8D8D;"></div>
                </div>

                <div class="palette-color-info-list">
                    <div class="color-detail-item">
                        <div class="color-preview-circle" style="background-color: #730808;"></div>
                        <div class="color-value-text">
                            <span>rgb(115, 8, 8)</span>
                            <strong>#730808</strong>
                        </div>
                    </div>
                    <div class="color-detail-item">
                        <div class="color-preview-circle" style="background-color: #DF3B3B;"></div>
                        <div class="color-value-text">
                            <span>rgb(223, 59, 59)</span>
                            <strong>#DF3B3B</strong>
                        </div>
                    </div>
                    </div>
            </div>

            <div class="palette-actions">
                <button class="btn-spectra btn-like">❤️ 210 K</button>
                <button class="btn-spectra">📥 Image</button>
                <button class="btn-spectra">🔗 Link</button>
            </div>

            <section class="more-similar-section">
                <h2 class="section-title">More similar palettes</h2>
                <div class="similar-grid">
                    <div class="similar-palette-card">
                        <div style="flex:1; background:#2c3e50;"></div>
                        <div style="flex:1; background:#34495e;"></div>
                        <div style="flex:1; background:#bdc3c7;"></div>
                    </div>
                    <div class="similar-palette-card">
                        <div style="flex:1; background:#1e272e;"></div>
                        <div style="flex:1; background:#485460;"></div>
                        <div style="flex:1; background:#808e9b;"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
