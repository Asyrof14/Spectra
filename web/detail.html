<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra - Color Detail</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <h2 class="sidebar-title">POPULAR TAGS</h2>
        <ul class="tag-list">
            <li>Dark</li><li>Light</li><li class="active">Warm</li><li>Nature</li><li>Cold</li>
        </ul>
    </aside>

    <main class="content">
        <header class="navbar">
            <div class="nav-left">
                <div class="logo">
                    <img src="img/Logo Spectra.png" alt="Spectra" class="logo-img">
                    <span>Spectra</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="search-container">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Search palettes...">
                </div>
            </div>

            <div class="nav-right">
                <a href="#">Home</a>
                <a href="#">Collection</a>
                <div class="avatar"></div>
            </div>
        </header>

        <div class="main-body">
            <div class="palette-section">
                <div class="palette-card">
                    <div class="palette-big">
                        <div class="strip" style="background: #730808;"></div>
                        <div class="strip" style="background: #DF3B3B;"></div>
                        <div class="strip" style="background: #EF4444;"></div>
                        <div class="strip" style="background: #F26868;"></div>
                        <div class="strip" style="background: #FB8D8D;"></div>
                    </div>
                    <div class="palette-footer">
                        <div class="btns">
                            <button class="action-btn"><i class="fa fa-heart" style="color: #ff4d4d;"></i> 210 K</button>
                            <button class="action-btn"><i class="fa fa-download"></i> Image</button>
                            <button class="action-btn"><i class="fa fa-link"></i> Link</button>
                        </div>
                        <div class="tags-row">
                            <span class="tag-label">Tags:</span>
                            <span class="chip">Red</span>
                            <span class="chip">Warm</span>
                        </div>
                    </div>
                </div>

                <div class="color-details-list">
                    <div class="info-card">
                        <div class="dot" style="background: #730808;"></div>
                        <div class="text"><small>HEX CODE</small><strong>#730808</strong></div>
                        <i class="fa fa-copy hover-icon"></i>
                    </div>
                    <div class="info-card">
                        <div class="dot" style="background: #DF3B3B;"></div>
                        <div class="text"><small>HEX CODE</small><strong>#DF3B3B</strong></div>
                        <i class="fa fa-copy hover-icon"></i>
                    </div>
                    <div class="info-card">
                        <div class="dot" style="background: #EF4444;"></div>
                        <div class="text"><small>HEX CODE</small><strong>#EF4444</strong></div>
                        <i class="fa fa-copy hover-icon"></i>
                    </div>
                    <div class="info-card">
                        <div class="dot" style="background: #F26868;"></div>
                        <div class="text"><small>HEX CODE</small><strong>#F26868</strong></div>
                        <i class="fa fa-copy hover-icon"></i>
                    </div>
                    <div class="info-card">
                        <div class="dot" style="background: #FB8D8D;"></div>
                        <div class="text"><small>HEX CODE</small><strong>#FB8D8D</strong></div>
                        <i class="fa fa-copy hover-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
