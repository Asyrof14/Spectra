<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <div class="overlay">
            <div class="left-text">
                <h2>Unlock the Power of Perfect Harmony.</h2>
                <p>
                    Save your favorite harmonies, manage your collections,
                    and discover the shades that define your next project.
                </p>
            </div>
        </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="right">
        <div class="form-box">
            <h1>Start your Creativity!</h1>
            <p class="subtitle">Register your account</p>

            <form>
                <label>Username</label>
                <input type="text" placeholder="Username">

                <label>Password</label>
                <div class="input-group">
                    <input type="password" placeholder="Password">
                    <span class="eye">👁</span>
                </div>

                <label>Confirm your password</label>
                <div class="input-group">
                    <input type="password" placeholder="Password">
                    <span class="eye">👁</span>
                </div>

                <button type="submit">Register</button>
            </form>

            <p class="bottom">
                Dont have any account? <a href="#">Register</a>
            </p>
        </div>
    </div>

</div>

</body>
</html>
